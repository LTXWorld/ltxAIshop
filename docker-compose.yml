services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ltxai_shop}
      POSTGRES_USER: ${POSTGRES_USER:-ltxai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ltxai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ltxai} -d ${POSTGRES_DB:-ltxai_shop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      DATABASE_URL: ${DATABASE_URL:-postgres://ltxai:ltxai@postgres:5432/ltxai_shop?sslmode=disable}
      MIGRATIONS_PATH: ${MIGRATIONS_PATH:-migrations}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      AUTH_TOKEN_KEY: ${AUTH_TOKEN_KEY:-development-insecure-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - "8088:80"

volumes:
  postgres_data:
